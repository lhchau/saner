dataloader:
  data_name: cifar100
  batch_size: 128
  noise: 0.25
model:
  model_name: resnet18
optimizer:
  opt_name: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 0.0005
trainer:
  epochs: 200
  seed: 42
  coteaching: true
  forget_rate: 0.2
  num_gradual: 10
  exponent: 1.0
logging:
  framework_name: wandb
  project_name: sam-label-noise-cifar100